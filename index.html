<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeeBuild — AI Construction Quality Control</title>
    <style>
        :root {
            --primary: #0A335C;
            --primary-light: #EBF3FA;
            --text-dark: #1E293B;
            --text-muted: #475569;
            --bg-light: #FFFFFF;
            --bg-section: #F8FAFC;
            --border-color: #E2E8F0;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
        }
        .container {
            width: 90%;
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 15px;
        }
        header {
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            background-color: var(--primary-light);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: #FFFFFF;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid var(--primary);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #06203B;
            border-color: #06203B;
        }
        .btn-outline {
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            margin-left: 10px;
        }
        .btn-outline:hover {
            background-color: #F1F5F9;
        }
        .section {
            padding: 80px 0;
        }
        .section-bg {
            background-color: var(--bg-section);
        }
        h2 {
            font-size: 36px;
            color: var(--primary);
            margin-bottom: 24px;
            font-weight: 700;
        }
        p {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 40px;
            align-items: center;
            padding: 40px 0;
        }
        .hero-img img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: block;
            margin: 0 auto;
        }
        .slogan-box {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin: 30px 0;
        }
        .problem-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .blue-card {
            background-color: var(--primary-light);
            padding: 40px;
            border-radius: 8px;
        }
        .blue-card h3 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 15px;
        }
        .problem-list {
            padding: 20px 10px;
            list-style: none;
        }
        .problem-list li {
            position: relative;
            padding-left: 25px;
            margin-bottom: 15px;
            font-size: 16px;
            color: var(--text-muted);
        }
        .problem-list li::before {
            content: "•";
            color: var(--primary);
            font-size: 24px;
            position: absolute;
            left: 5px;
            top: -4px;
        }
        .solution-text {
            font-size: 18px;
            max-width: 900px;
            margin-bottom: 40px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }
        .sol-card {
            background: #FDFEFE;
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 8px;
        }
        .sol-card h4 {
            color: var(--primary);
            font-size: 20px;
            margin-bottom: 12px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            text-align: center;
            margin-bottom: 40px;
        }
        .metric-num {
            font-size: 56px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .metric-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
        }
        .info-bar {
            background-color: #D3E4F4;
            padding: 20px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }
        .info-icon {
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .patent-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .patent-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 752px;
        }
        .patent-card {
            border: 1px solid var(--border-color);
            border-left: 5px solid var(--primary);
            padding: 25px;
            border-radius: 4px;
            background: var(--bg-light);
        }
        .patent-card h4 {
            font-size: 17px;
            color: var(--text-dark);
            margin-bottom: 10px;
            font-weight: 700;
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .sensor-card {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .sensor-img {
            width: 70px;
            height: 70px;
            border-radius: 6px;
            object-fit: cover;
        }
        .sensor-card h4 {
            font-size: 18px;
            color: var(--text-dark);
            font-weight: 700;
        }
        .workflow-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin: 40px 0;
        }
        .wf-step {
            text-align: center;
            flex: 1;
        }
        .wf-circle {
            width: 100px;
            height: 100px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-light);
        }
        .wf-circle svg {
            width: 40px;
            height: 40px;
            fill: var(--primary);
        }
        .wf-step p {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 15px;
        }
        .wf-arrow {
            font-size: 32px;
            color: var(--primary);
            font-weight: 300;
            margin-bottom: 30px;
        }
        .author-grid {
            display: grid;
            grid-template-columns: 0.7fr 1.3fr;
            gap: 40px;
            align-items: start;
        }
        .book-cover img {
            width: 100%;
            max-width: 320px;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: block;
        }
        .author-details h3 {
            font-size: 22px;
            color: var(--text-dark);
            margin-bottom: 15px;
        }
        .concepts-box {
            margin-top: 30px;
        }
        .concept-item {
            margin-bottom: 20px;
        }
        .concept-item h5 {
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }
        .grey-card {
            background-color: #D3E4F4;
            padding: 30px;
            border-radius: 6px;
            margin-top: 25px;
            font-weight: 600;
            color: var(--primary);
        }
        .contact-box {
            max-width: 600px;
            margin: 30px auto 0 auto;
            border: 1px solid var(--border-color);
            padding: 30px;
